spring:
  datasource:
    password: secret
    username: myuser
    url: "jdbc:postgresql://localhost:5432/mydatabase"

  ai:
    google:
      genai:
        chat:
          options:
            model: gemini-3.1-flash-lite
        api-key: ${GEMINI_API_KEY}
        embedding:
          api-key: ${GEMINI_API_KEY}
          options:
            model: text-embedding-004

    vectorstore:
      pgvector:
        dimensions: 768
        initialize-schema: true
storage:
  local:
    folder-name: /home/david/arm-learn-files
piper:
  url: http://localhost:5000
  # TODO hardcoding these properties here might not be the best choice to be honest, maybe we should get them from the webserver which we use here
  model-name: hy_AM-medium
  voice-identifier: gor-medium
logging:
  level:
    com.blbulyandavbulyan.larm: DEBUG