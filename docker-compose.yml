services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: assistant-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      # This line automatically creates the extension on startup:
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - mcp-bridge
    restart: unless-stopped

networks:
  mcp-bridge:
    # Explicitly naming the network makes it predictable for the 'docker run' command
    name: mcp-shared-network

volumes:
  pgdata: