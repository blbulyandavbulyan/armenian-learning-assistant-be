name: armenian-learning-assitant-be CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven # Speeds up builds by caching dependencies

      - name: Compile
        run: mvn clean compile

      - name: Run Tests
        run: mvn test

      - name: Verify
        run: mvn verify