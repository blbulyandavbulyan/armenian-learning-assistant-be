name: armenian-learning-assitant-be CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven # Speeds up builds by caching dependencies

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Compile
        run: mvn clean compile

      - name: Run Tests
        run: mvn test

      - name: Verify
        run: mvn verify

      - name: Cache Pitest history
        uses: actions/cache@v6
        with:
          # Match the path you set in the pom.xml
          path: .pitest
          # Use SHA so it successfully saves on every single commit
          key: ${{ runner.os }}-pitest-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            # 1st priority: Previous commits on this exact MR
            ${{ runner.os }}-pitest-${{ github.ref }}-
            # 2nd priority: The main branch baseline
            ${{ runner.os }}-pitest-refs/heads/main-

      - name: Run Pitest
        run: mvn test-compile org.pitest:pitest-maven:mutationCoverage

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/
            target/site/jacoco-it/

      - name: Upload Pitest Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-reports
          path: target/pit-reports/
